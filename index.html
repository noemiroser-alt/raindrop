<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raindrop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(180deg, #0d1b2a 0%, #1a2f4a 60%, #0f3460 100%);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    canvas {
      display: block;
    }

    #gate {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }

    #gate input {
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 15px;
      outline: none;
      text-align: center;
      letter-spacing: 2px;
    }

    #gate input::placeholder { color: rgba(255,255,255,0.35); letter-spacing: normal; }

    #gate button {
      padding: 9px 28px;
      border: none;
      border-radius: 8px;
      background: #4a9fd4;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    #gate button:hover { background: #3a8fc4; }

    #gate .hint {
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      font-family: sans-serif;
    }

    #gate .error {
      color: #ff7b7b;
      font-size: 13px;
      font-family: sans-serif;
      display: none;
    }
  </style>
</head>
<body>
  <div id="gate">
    <input id="pw" type="password" placeholder="Password" autofocus/>
    <button onclick="check()">Enter</button>
    <span class="hint">Hint: the name of your favourite designer</span>
    <span class="error" id="err">Incorrect password</span>
  </div>

  <canvas id="rain"></canvas>

  <script>
    // Password gate
    if (sessionStorage.getItem('auth') === '1') document.getElementById('gate').style.display = 'none';
    document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
    function check() {
      if (document.getElementById('pw').value === 'noemi') {
        sessionStorage.setItem('auth', '1');
        document.getElementById('gate').style.display = 'none';
      } else {
        document.getElementById('err').style.display = 'block';
      }
    }

    // Rain animation
    const canvas = document.getElementById('rain');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const DROP_COUNT = 120;

    function randomDrop() {
      const size = Math.random() * 10 + 6; // 6–16px tall
      return {
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight - window.innerHeight,
        w: size * 0.38,
        h: size,
        speed: Math.random() * 4 + 3,
        opacity: Math.random() * 0.5 + 0.3,
        wobble: Math.random() * 0.8 - 0.4, // slight horizontal drift
      };
    }

    const drops = Array.from({ length: DROP_COUNT }, randomDrop);

    function drawDrop(d) {
      ctx.save();
      ctx.translate(d.x, d.y);

      // Raindrop path: pointed top, rounded bottom
      ctx.beginPath();
      ctx.moveTo(0, -d.h / 2);                          // tip
      ctx.bezierCurveTo(
        d.w,  -d.h * 0.1,
        d.w,   d.h * 0.4,
        0,     d.h / 2
      );
      ctx.bezierCurveTo(
        -d.w,  d.h * 0.4,
        -d.w, -d.h * 0.1,
        0,    -d.h / 2
      );
      ctx.closePath();

      const grad = ctx.createLinearGradient(0, -d.h / 2, 0, d.h / 2);
      grad.addColorStop(0,   `rgba(168, 216, 255, ${d.opacity})`);
      grad.addColorStop(0.6, `rgba(74, 159, 212, ${d.opacity})`);
      grad.addColorStop(1,   `rgba(26, 95, 138, ${d.opacity})`);

      ctx.fillStyle = grad;
      ctx.fill();

      // Tiny shine
      ctx.beginPath();
      ctx.ellipse(-d.w * 0.25, -d.h * 0.15, d.w * 0.18, d.h * 0.22, -0.4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${d.opacity * 0.6})`;
      ctx.fill();

      ctx.restore();
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const d of drops) {
        drawDrop(d);
        d.y += d.speed;
        d.x += d.wobble;

        if (d.y - d.h > canvas.height) {
          Object.assign(d, randomDrop());
          d.y = -d.h;
        }
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
